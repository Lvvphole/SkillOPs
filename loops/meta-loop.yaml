# LoopSpec: meta-loop. Reviews the SkillOps runtime itself -- are loops healthy,
# are escalations resolved, are updates versioned and reversible?
loop_id: meta-loop
target_skill: incident-triage   # v1 meta-loop observes the sample skill's health
trigger:
  type: schedule
  cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month

runtime_limits:
  max_iterations: 50
  token_cap: 1200
  max_escalations: 5

required_evidence:
  - run_history
  - incident_outcomes

required_metrics:
  - success_rate
  - avg_duration_ms
  - false_positive_rate
  - action_rate

thresholds:
  min_success_rate: 0.8
  max_avg_duration_ms: 1000
  max_false_positive_rate: 0.2
  min_action_rate: 0.25

branches:
  corrective: "a tracked loop is failing -> open corrective work"
  preventive: "all loops healthy -> drift + optimization review"
  optimization: "evidence-backed runtime improvement -> candidate + PR"

preventive_actions:
  - run_staleness_check
  - run_drift_check
  - run_optimization_scan

verifier_rejection_behavior: revise_once_or_escalate
test_failure_behavior: escalate_after_two_failures
pr_created_behavior: record_url_stop_cycle_wait_next_trigger
memory_file: skillops/memory/skill-memory.json

required_artifacts:
  - artifacts/metric-summary.json
  - artifacts/evaluation-report.md

terminal_states:
  - PASS_NO_CHANGE_RECORDED
  - PASS_CANDIDATE_REJECTED_RECORDED
  - PASS_CANDIDATE_PR_CREATED
  - FAIL_PATCH_PR_CREATED
  - ESCALATED_WITH_BLOCKER
